<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/brands.min.css">
    <title>Responsive medical website</title>


</head>

<body>
    <!--==Hero-Section========================-->
    <section id="hero">

        <!--==navigation====================-->
        <nav class="navigation">
            <!--**menu-btn*****-->
            <input type="checkbox" class="menu-btn" id="menu-btn">
            <label for="menu-btn" class="menu-icon">
                <span class="nav-icon"></span>
            </label>
            <!--**logo*********-->
            <a class="logo" href="index.html"><span>We</span>Care</a>
            <!--**menu*********-->
            <ul class="menu">
                <li><a href="#our-team">Find A Doctor</a></li>
                <li><a href="#our-services">Our Services</a></li>
                <li><a href="#testimonials">Testimonial's</a></li>
            </ul>
            <!--**contact*******-->
            <a class="nav-appointment-btn" href="#">Appointment</a>
        </nav><!--nav-end-->

           <!--==Content============================-->
        <div class="hero-content">
            <!--**text****************-->
            <div class="hero-text">
                <h1>Feel Better About Finding HealthCare</h1>
                <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Id, vitae ex! Fuga similique repudiandae
                    molestiae libero.</p>
                <!--btns-->
                <div class="hero-text-btns">
                    <a href="#"><i class="fa-solid fa-magnifying-glass"></i> Find Doctor's</a>
                    <a href="#"><i class="fa-solid fa-check"></i> Book Appointment</a>
                </div>
            </div>
            <!--**img*****************-->
            <div class="hero-img">
                <img alt="" src="images/main-bg.png">
            </div>
        </div>

    </section>

    <!--==appointment-search===============================-->
    <div class="appointment-search-container">
        <h3>Find Best HealthCare</h3>
        <form class="appointment-search">
            <!--**doctor-search-box*******-->
            <div class="appo-search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search Doctor Here or For Advice">
            </div>
            <!--**set-your-location*******-->
            <div class="appo-search-box">
                <i class="fa-solid fa-location-dot"></i>
                <input type="text" placeholder="Set Your Location">
            </div>
            <!--**btn*********************-->
            <button>
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </form>
    </div>
</body>

</html>
